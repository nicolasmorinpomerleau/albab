<!DOCTYPE html>
<html lang="en" data-theme="manuscript">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quran Display</title>
    <link rel="icon" type="image/x-icon" href="img/icon-192.png">
    <link rel="stylesheet" href="css/Styles.css">
    <link rel="stylesheet" href="css/features.css">
    <!-- v10.1: PWA — installable & offline-capable -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#c9a444">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Quran">
    <link rel="apple-touch-icon" href="img/icon-192.png">
    <script defer src="https://cloud.umami.is/script.js" data-website-id="a2fcf185-ba7e-4327-bd64-48847eab9358"></script>
</head>
<body>
    <div class="burger-menu" id="burgerMenu">☰</div>

    <header>
        <div id="header-center">
            <!-- v10.4: Prominent install banner — visible at the top so users notice it -->
            <button id="headerInstallBtn" class="header-install-btn" style="display:none;" type="button">
                <span class="hib-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 3v11.59l-3.3-3.3a1 1 0 0 0-1.4 1.42l5 5a1 1 0 0 0 1.4 0l5-5a1 1 0 0 0-1.4-1.42L13 14.59V3a1 1 0 0 0-2 0z"/>
                        <path d="M5 19a1 1 0 0 0 0 2h14a1 1 0 0 0 0-2H5z"/>
                    </svg>
                </span>
                <span class="hib-text">Install App</span>
                <span class="hib-close" id="headerInstallClose" title="Dismiss">✕</span>
            </button>
        </div>
        <div id="themeSwitcher">
            <button class="theme-btn active" data-theme="manuscript">
                <span class="theme-swatch theme-swatch-manuscript"></span>
                <span class="theme-name-primary">🌙 Sepia</span>
                <span class="theme-name-aesthetic">Manuscript</span>
            </button>
            <button class="theme-btn" data-theme="minimal">
                <span class="theme-swatch theme-swatch-minimal"></span>
                <span class="theme-name-primary">☀️ Light</span>
                <span class="theme-name-aesthetic">Minimal</span>
            </button>
            <button class="theme-btn" data-theme="scholar">
                <span class="theme-swatch theme-swatch-scholar"></span>
                <span class="theme-name-primary">🌑 Dark</span>
                <span class="theme-name-aesthetic">Scholar</span>
            </button>
        </div>
        <!-- Phone-only settings icon (top-right, ≤767px) -->
        <button id="phoneSettingsBtn" class="phone-settings-btn" type="button" title="Settings">⚙️</button>
    </header>

    <!-- Phone reading progress bar (hidden on desktop via CSS) -->
    <div id="surahProgressBar" class="surah-progress-bar">
        <div id="surahProgressFill" class="surah-progress-fill"></div>
    </div>

    <main>
        <aside class="sidebar1" id="sidebar">
            <div id="sidebarHeader">
                <span id="sidebarTitle">القرآن الكريم</span>
                <button id="sidebarCloseBtn" onclick="closeSidebar()">✕</button>
            </div>
            <div id="hijriMonth">
                <div class="date-gregorian"></div>
                <div class="date-hijri"></div>
            </div>
            <div id="controlsElements">

                <!-- v10.8: Reading-time widget -->
                <div id="topAccessBar">
                    <div id="topReadingTime" class="trt-widget">
                        <div class="trt-widget-head">
                            <span class="trt-widget-title">⏱ Reading Time</span>
                            <button class="trt-widget-x" id="trtCloseBtn" title="Hide">✕</button>
                        </div>
                        <div class="trt-stats">
                            <div class="trt-stat">
                                <div class="trt-stat-lbl">This week</div>
                                <div class="trt-val trt-stat-val">—</div>
                            </div>
                            <div class="trt-stat-sep"></div>
                            <div class="trt-stat">
                                <div class="trt-stat-lbl">4-week avg</div>
                                <div class="trt-avg trt-stat-val">—</div>
                            </div>
                        </div>
                        <div class="trt-widget-foot">
                            <button class="trt-widget-reset" id="trtResetBtn">🗑 Reset</button>
                        </div>
                    </div>
                </div>

                <!-- v10.13: Search — collapsible section (default open) -->
                <div class="side-group" data-default="open">
                    <button class="side-group-header" type="button">
                        <span class="side-group-arrow">▶</span>
                        <span class="side-group-label" data-i18n="sectionSearch">Search</span>
                    </button>
                    <div class="side-group-body">
                <div id="searchControls">
                    <input type="text" id="search-input" placeholder="🔍 Search the Quran…">
                    <!-- Search history chips -->
                    <div id="searchHistoryRow"></div>
                    <div id="searDetails">
                        <div id="arabic-options" style="display:none;">
                            <label>
                                <input type="checkbox" id="ignore-diacritics">
                                تجاهل علامات التشكيل
                            </label>
                        </div>
                        <div id="searchButtons">
                            <button id="searchbutton">Quran Search</button>
                            <button id="searchButtonSourats">Surah Search</button>
                        </div>
                    </div>
                </div>
                    </div>
                </div>

                <!-- v10: Display section (theme + font sliders) — collapsed -->
                <div class="side-group" data-default="closed">
                    <button class="side-group-header" type="button">
                        <span class="side-group-arrow">▶</span>
                        <span class="side-group-label" data-i18n="sectionDisplay">Display</span>
                    </button>
                    <div class="side-group-body">
                        <!-- Font size slider -->
                        <div id="fontSizeSection">
                            <label class="SelectLanguage" id="lbl-fontsize" data-i18n="settingsFontSize">Font size</label>
                            <div class="font-slider-row">
                                <span class="font-slider-label font-slider-label-text" data-i18n="settingsVerseLabel">Verse</span>
                                <input type="range" id="arabicFontSlider" min="1.2" max="5" step="0.1" value="2.8">
                                <span class="font-slider-val" id="arabicFontVal">2.8</span>
                            </div>
                            <div class="font-slider-row">
                                <span class="font-slider-label font-slider-label-text" data-i18n="settingsTranslLabel">Translation</span>
                                <input type="range" id="transFontSlider" min="0.7" max="3" step="0.05" value="1.87">
                                <span class="font-slider-val" id="transFontVal">1.87</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- v10: Languages section — collapsed -->
                <div class="side-group" data-default="closed">
                    <button class="side-group-header" type="button">
                        <span class="side-group-arrow">▶</span>
                        <span class="side-group-label" data-i18n="sectionLanguages">Languages</span>
                    </button>
                    <div class="side-group-body">
                        <div id="firstLanguage">
                            <label for="languageSelector" class="SelectLanguage">Quran language</label>
                            <select id="languageSelector">
                                <option value="arabic">Arabic</option>
                                <option value="french">Français</option>
                                <option value="english">English</option>
                                <option value="spanish">Español</option>
                            </select>
                        </div>

                        <div id="multiLanguage">
                            <label class="SelectLanguage">
                                Add translations
                                <span class="lang-badge">unlimited</span>
                            </label>
                            <div id="langTagsContainer"></div>
                            <select id="SurahLanguageSelector">
                                <option value="">+ Add a language…</option>
                                <option value="arabic">Arabic</option>
                                <option value="french">Français</option>
                                <option value="english">English</option>
                                <option value="spanish">Español</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- v10: Tools section — collapsed -->
                <div class="side-group" data-default="closed">
                    <button class="side-group-header" type="button">
                        <span class="side-group-arrow">▶</span>
                        <span class="side-group-label" data-i18n="sectionTools">Tools</span>
                    </button>
                    <div class="side-group-body">
                        <div id="toggleButtons">
                            <button id="context">Surah Context</button>
                            <button id="bookmarksBtn">📁 Saved</button>
                            <button id="khatmBtn" class="khatm-sidebar-btn">🎯 Khatm tracker</button>
                            <button id="featuresBtn">⚙ Features &amp; Tools</button>
                        </div>
                    </div>
                </div>

                <!-- Support section — collapsed -->
                <div class="side-group" data-default="closed">
                    <button class="side-group-header" type="button">
                        <span class="side-group-arrow">▶</span>
                        <span class="side-group-label" data-i18n="sectionSupport">Support</span>
                    </button>
                    <div class="side-group-body">
                        <div id="desktopSupportBtns">
                            <button id="desktopHelpBtn">❓ Help &amp; Tutorial</button>
                            <button id="desktopFeedbackBtn">✉ Feedback</button>
                        </div>
                    </div>
                </div>

            </div>
            <!-- Version shown at bottom of desktop sidebar -->
            <div id="sidebarVersionEl" class="sidebar-version">v11.0.0</div>
        </aside>

        <article class="main">
            <div id="content-wrapper">

                <!-- Saved hub panel (Bookmarks / Notes / Highlights) -->
                <div id="bookmarksPanel" class="eraseDiv">
                    <div id="bookmarks-topbar">
                        <span id="bookmarks-label">📁 Saved</span>
                        <button id="bookmarksReset" title="Clear all in this tab">🗑 Reset</button>
                        <button id="bookmarksClose">✕ Close</button>
                    </div>
                    <div id="saved-tabs">
                        <button class="saved-tab active" data-savedtab="bookmarks">
                            <span class="st-ico">🔖</span><span class="st-lbl">Bookmarks</span>
                        </button>
                        <button class="saved-tab" data-savedtab="notes">
                            <span class="st-ico">📝</span><span class="st-lbl">Notes</span>
                        </button>
                        <button class="saved-tab" data-savedtab="highlights">
                            <span class="st-ico">✦</span><span class="st-lbl">Highlights</span>
                        </button>
                        <button class="saved-tab" data-savedtab="reflections">
                            <span class="st-ico">✍️</span><span class="st-lbl">Reflections</span>
                        </button>
                    </div>
                    <div id="bookmarks-list"></div>
                </div>

                <!-- Search results -->
                <div class="eraseDiv" id="resultsContainerID">
                    <div id="results-topbar">
                        <span id="results-label">Results</span>
                        <button id="reset-button">✕ Close</button>
                    </div>
                    <div id="search-results" class="eraseDiv"></div>
                </div>

                <div id="quranContainer" class="textContainer"></div>
                <div id="suraContent" class="eraseDiv"></div>

                <!-- TOC with 3 tabs: Surahs / Juz / Revelation -->
                <div id="tocContainer" class="sidenav">
                    <div id="tocResizeHandle" title="Drag left to enlarge"></div>
                    <div id="tocTabRow">
                        <button class="toc-tab toc-tab-active" data-tab="surah">Surahs</button>
                        <button class="toc-tab" data-tab="juz">Juz</button>
                        <button class="toc-tab" data-tab="revelation">Revelation</button>
                        <button class="toc-tab" data-tab="topics">Topics</button>
                    </div>
                    <div id="toc-section-label"></div>
                    <div class="toc-scroll" id="toc-scroll"></div>
                </div>

            </div>
        </article>
    </main>

    <!-- Note modal -->
    <div id="noteModal" class="note-modal-overlay" style="display:none;">
        <div class="note-modal">
            <div class="note-modal-header">
                <span id="noteModalTitle">Verse note</span>
                <button id="noteModalClose">✕</button>
            </div>
            <textarea id="noteModalText" placeholder="Write your note here…"></textarea>
            <div class="note-modal-footer">
                <button id="noteModalSave">Save note</button>
                <button id="noteModalDelete">Delete note</button>
            </div>
        </div>
    </div>

    <!-- Mobile overlay for sidebar drawer -->
    <div id="sidebarOverlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

    <!-- Bottom navigation bar (tablet + mobile) — v10.13 phone redesign: 4 tabs -->
    <nav id="bottomNav" class="bottom-nav">
        <button class="bnav-btn bnav-active" data-action="read">
            <span class="bnav-pill">
                <span class="bnav-ico">📖</span>
                <span class="bnav-lbl">Read</span>
            </span>
        </button>
        <button class="bnav-btn" data-action="share">
            <span class="bnav-pill">
                <span class="bnav-ico">📤</span>
                <span class="bnav-lbl">Share</span>
            </span>
        </button>
        <button class="bnav-btn" data-action="bookmark">
            <span class="bnav-pill">
                <span class="bnav-ico">🔖</span>
                <span class="bnav-lbl">Bookmark</span>
            </span>
        </button>
        <button class="bnav-btn" data-action="search">
            <span class="bnav-pill">
                <span class="bnav-ico">🔍</span>
                <span class="bnav-lbl">Search</span>
            </span>
        </button>
    </nav>


    <!-- Universal mobile bottom sheet -->
    <div id="mobileSheetOverlay" class="mob-sheet-overlay" onclick="closeMobileSheet()"></div>
    <div id="mobileSheet" class="mob-sheet">
        <div class="mob-sheet-grab" id="mobileSheetGrab">
            <div class="mob-sheet-handle" id="mobileSheetHandle"></div>
        </div>
        <div class="mob-sheet-header">
            <span class="mob-sheet-title" id="mobileSheetTitle"></span>
            <button class="mob-sheet-close" onclick="closeMobileSheet()">✕</button>
        </div>
        <div class="mob-sheet-body" id="mobileSheetBody"></div>
    </div>

    <!-- Reusable confirm dialog -->
    <div id="confirmOverlay" class="confirm-overlay" onclick="cancelConfirm(event)">
        <div class="confirm-box">
            <div class="confirm-title" id="confirmTitle">Are you sure?</div>
            <div class="confirm-text" id="confirmText"></div>
            <div class="confirm-btns">
                <button class="confirm-btn" onclick="cancelConfirm()">Cancel</button>
                <button class="confirm-btn danger" id="confirmOK">Confirm</button>
            </div>
        </div>
    </div>

    <!-- v9.12: Desktop Features modal — same content as mobile settings sheet -->
    <div id="featuresModal" class="features-modal-overlay" onclick="closeFeaturesModal(event)">
        <div class="features-modal-box" onclick="event.stopPropagation()">
            <div class="features-modal-header">
                <span class="features-modal-title">⚙ Features &amp; Tools</span>
                <button class="features-modal-close" onclick="closeFeaturesModal()">✕</button>
            </div>
            <div class="features-modal-body" id="featuresModalBody"></div>
        </div>
    </div>

    <!-- Phone hamburger drawer (left side, ≤767px only) -->
    <div id="mobileDrawer" class="mob-drawer">
        <div class="mob-drawer-header">
            <img src="img/icon-64.png" class="mob-drawer-icon" alt="">
            <span class="mob-drawer-title">Quran App</span>
            <button class="mob-drawer-close" id="mobileDrawerClose">✕</button>
        </div>
        <div class="mob-drawer-dates" id="mobileDrawerDates"></div>

        <!-- Quran Journey -->
        <div class="mob-drawer-section-label">Quran Journey</div>
        <nav class="mob-drawer-nav">
            <button class="mob-drawer-item" id="mdKhatmBtn">
                <span class="mob-drawer-ico">🎯</span>
                <span class="mob-drawer-lbl">Khatm Tracker</span>
                <span class="mob-drawer-chevron">›</span>
            </button>
            <button class="mob-drawer-item" id="mdReadingPlanBtn">
                <span class="mob-drawer-ico">📅</span>
                <span class="mob-drawer-lbl">Reading Plan</span>
                <span class="mob-drawer-chevron">›</span>
            </button>
            <button class="mob-drawer-item" id="mdReadingTimeBtn">
                <span class="mob-drawer-ico">⏱</span>
                <span class="mob-drawer-lbl">Reading Time</span>
                <span class="mob-drawer-chevron">›</span>
            </button>
            <button class="mob-drawer-item" id="mdSurahContextBtn">
                <span class="mob-drawer-ico">📜</span>
                <span class="mob-drawer-lbl">Surah Context</span>
                <span class="mob-drawer-chevron">›</span>
            </button>
        </nav>

        <!-- Daily Content -->
        <div class="mob-drawer-section-label">Daily Content</div>
        <nav class="mob-drawer-nav">
            <button class="mob-drawer-item" id="mdDailyVerseBtn">
                <span class="mob-drawer-ico">🌅</span>
                <span class="mob-drawer-lbl">Daily Verse</span>
                <span class="mob-drawer-chevron">›</span>
            </button>
            <button class="mob-drawer-item" id="mdReflectionBtn">
                <span class="mob-drawer-ico">✍️</span>
                <span class="mob-drawer-lbl">Reflection Prompt</span>
                <span class="mob-drawer-chevron">›</span>
            </button>
        </nav>

        <!-- Support -->
        <div class="mob-drawer-section-label">Support</div>
        <nav class="mob-drawer-nav">
            <button class="mob-drawer-item" id="mdHelpBtn">
                <span class="mob-drawer-ico">❓</span>
                <span class="mob-drawer-lbl">Help &amp; Tutorial</span>
                <span class="mob-drawer-chevron">›</span>
            </button>
            <button class="mob-drawer-item" id="mdFeedbackBtn">
                <span class="mob-drawer-ico">💬</span>
                <span class="mob-drawer-lbl">Feedback</span>
                <span class="mob-drawer-chevron">›</span>
            </button>
        </nav>

        <!-- Language -->
        <div class="mob-drawer-divider"></div>
        <div class="mob-drawer-lang-section">
            <div class="mob-drawer-lang-label">Language</div>
            <div class="mob-drawer-langs" id="mobileDrawerLangs">
                <button class="mob-drawer-lang" data-lang="arabic">AR</button>
                <button class="mob-drawer-lang" data-lang="french">FR</button>
                <button class="mob-drawer-lang" data-lang="english">EN</button>
                <button class="mob-drawer-lang" data-lang="spanish">ES</button>
            </div>
        </div>
    </div>
    <div id="mobileDrawerOverlay" class="mob-drawer-overlay"></div>

    <footer id="appFooter">May you read with a mindful heart</footer>
    <script src="js/script.js"></script>
    <script src="js/features.js"></script>
</body>
</html>
